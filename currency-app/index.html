<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lahore Exchange — Currency Board</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1c1b19">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --board-bg:#1c1b19;
    --panel-bg:#252320;
    --panel-bg-2:#2c2924;
    --amber:#e8a33d;
    --amber-dim:#a97a34;
    --green:#5aa584;
    --ivory:#f2ede4;
    --muted:#8a8578;
    --divider:#3c372e;
    --red:#c0654f;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--board-bg);color:var(--ivory);font-family:'IBM Plex Sans',sans-serif;}
  .board{
    max-width:760px;
    margin:0 auto;
    padding:32px 20px 48px;
  }
  .board-frame{
    background:linear-gradient(180deg,#242220,#1c1b19);
    border:1px solid #38352d;
    border-radius:14px;
    padding:28px 26px 22px;
    box-shadow:0 30px 60px -30px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.03);
  }
  header{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    border-bottom:1px solid var(--divider);
    padding-bottom:16px;
    margin-bottom:22px;
  }
  .wordmark{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-style:italic;
    font-size:26px;
    letter-spacing:0.2px;
    color:var(--ivory);
  }
  .wordmark span{color:var(--amber);}
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    letter-spacing:2.5px;
    color:var(--muted);
    text-transform:uppercase;
    margin-bottom:4px;
  }
  .status{
    text-align:right;
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--muted);
  }
  .status .dot{
    display:inline-block;
    width:6px;height:6px;
    border-radius:50%;
    background:var(--green);
    margin-right:6px;
    box-shadow:0 0 6px var(--green);
  }
  .status.err .dot{background:var(--red);box-shadow:0 0 6px var(--red);}

  .row{
    background:var(--panel-bg);
    border:1px solid var(--divider);
    border-radius:10px;
    padding:16px 18px;
    margin-bottom:10px;
  }
  .row-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
  }
  .row-label{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    letter-spacing:2px;
    color:var(--muted);
    text-transform:uppercase;
  }
  .cur-btn{
    display:flex;
    align-items:center;
    gap:8px;
    background:var(--panel-bg-2);
    border:1px solid var(--divider);
    color:var(--ivory);
    font-family:'IBM Plex Mono',monospace;
    font-weight:600;
    font-size:14px;
    letter-spacing:1px;
    padding:6px 12px 6px 10px;
    border-radius:7px;
    cursor:pointer;
    transition:border-color .15s ease, background .15s ease;
  }
  .cur-btn:hover{border-color:var(--amber-dim); background:#332f28;}
  .cur-btn .flag{font-size:14px; opacity:.85;}
  .cur-btn svg{width:10px;height:10px;opacity:.6;}

  .amount-input{
    width:100%;
    background:transparent;
    border:none;
    outline:none;
    color:var(--ivory);
    font-family:'IBM Plex Mono',monospace;
    font-size:30px;
    font-weight:500;
    letter-spacing:0.5px;
    padding:4px 0 0;
  }
  .amount-input::placeholder{color:#4c473c;}

  .flap-row{
    display:flex;
    gap:4px;
    padding-top:4px;
    flex-wrap:wrap;
    align-items:center;
  }
  .flap{
    position:relative;
    width:24px;
    height:36px;
    perspective:120px;
  }
  .flap.wide{width:14px;}
  .flap-face{
    position:absolute;
    inset:0;
    background:var(--panel-bg-2);
    border:1px solid var(--divider);
    border-radius:4px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'IBM Plex Mono',monospace;
    font-size:22px;
    font-weight:600;
    color:var(--amber);
  }
  .flap-sep{
    width:10px;
    text-align:center;
    font-family:'IBM Plex Mono',monospace;
    font-size:22px;
    color:var(--muted);
    align-self:center;
  }
  .flap-flip .flap-face{
    animation:flipdown .22s ease;
  }
  @keyframes flipdown{
    0%{transform:rotateX(0deg); filter:brightness(1);}
    45%{transform:rotateX(-90deg); filter:brightness(1.6);}
    46%{transform:rotateX(90deg);}
    100%{transform:rotateX(0deg); filter:brightness(1);}
  }

  .mid-row{
    display:flex;
    align-items:center;
    gap:12px;
    margin:2px 0 10px;
  }
  .mid-line{flex:1; height:1px; background:var(--divider);}
  .swap-btn{
    width:36px;height:36px;
    border-radius:50%;
    background:var(--panel-bg-2);
    border:1px solid var(--divider);
    color:var(--amber);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    transition:transform .2s ease, border-color .15s ease;
  }
  .swap-btn:hover{border-color:var(--amber-dim);}
  .swap-btn.spin{transform:rotate(180deg);}
  .swap-btn svg{width:16px;height:16px;}

  .rate-line{
    font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;
    color:var(--muted);
    text-align:center;
    margin:6px 0 18px;
  }
  .rate-line b{color:var(--ivory); font-weight:500;}

  .quick-row{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:20px;
  }
  .quick-btn{
    background:var(--panel-bg);
    border:1px solid var(--divider);
    color:var(--muted);
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    padding:7px 13px;
    border-radius:20px;
    cursor:pointer;
    transition:all .15s ease;
  }
  .quick-btn:hover{color:var(--ivory); border-color:var(--amber-dim);}
  .quick-btn.copy{
    margin-left:auto;
    color:var(--amber);
    display:flex;align-items:center;gap:6px;
  }
  .quick-btn.copy svg{width:12px;height:12px;}

  .ticker-wrap{
    overflow:hidden;
    border-top:1px solid var(--divider);
    padding-top:14px;
    margin-top:4px;
  }
  .ticker-label{
    font-family:'IBM Plex Mono',monospace;
    font-size:9.5px;
    letter-spacing:2px;
    color:var(--muted);
    margin-bottom:8px;
    text-transform:uppercase;
  }
  .ticker{
    display:flex;
    gap:28px;
    white-space:nowrap;
    animation:scroll 26s linear infinite;
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
  }
  .ticker span.pair{color:var(--muted);}
  .ticker span.val{color:var(--ivory); margin-left:6px;}
  @keyframes scroll{
    from{transform:translateX(0);}
    to{transform:translateX(-50%);}
  }

  .modal-backdrop{
    position:fixed; inset:0;
    background:rgba(10,9,8,0.6);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:20;
    padding:20px;
  }
  .modal-backdrop.open{display:flex;}
  .modal{
    background:var(--panel-bg);
    border:1px solid var(--divider);
    border-radius:12px;
    width:100%;
    max-width:340px;
    max-height:70vh;
    overflow:auto;
    padding:8px;
  }
  .modal-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:11px 12px;
    border-radius:7px;
    cursor:pointer;
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
  }
  .modal-item:hover{background:var(--panel-bg-2);}
  .modal-item .code{color:var(--ivory); font-weight:600;}
  .modal-item .name{color:var(--muted); font-size:11px;}

  footer.note{
    text-align:center;
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    color:#5f5b4e;
    margin-top:16px;
    letter-spacing:0.5px;
  }

  @media (max-width:480px){
    .wordmark{font-size:21px;}
    .amount-input{font-size:24px;}
    .flap{width:19px;height:30px;}
    .flap-face{font-size:17px;}
  }
</style>
</head>
<body>

<div class="board">
  <div class="board-frame">
    <header>
      <div>
        <div class="eyebrow">Lahore Exchange</div>
        <div class="wordmark">Board<span>.</span>fx</div>
      </div>
      <div class="status" id="status"><span class="dot"></span><span id="statusText">connecting</span></div>
    </header>

    <div class="row">
      <div class="row-top">
        <span class="row-label">You send</span>
        <button class="cur-btn" id="fromBtn">
          <span class="flag" id="fromFlag">🇺🇸</span>
          <span id="fromCode">USD</span>
          <svg viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.3"/></svg>
        </button>
      </div>
      <input class="amount-input" id="amountInput" inputmode="decimal" value="100" />
    </div>

    <div class="mid-row">
      <div class="mid-line"></div>
      <div class="swap-btn" id="swapBtn" title="Swap currencies">
        <svg viewBox="0 0 24 24" fill="none"><path d="M7 10l5-5 5 5M12 5v14M17 14l-5 5-5-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="mid-line"></div>
    </div>

    <div class="row">
      <div class="row-top">
        <span class="row-label">Recipient gets</span>
        <button class="cur-btn" id="toBtn">
          <span class="flag" id="toFlag">🇵🇰</span>
          <span id="toCode">PKR</span>
          <svg viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.3"/></svg>
        </button>
      </div>
      <div class="flap-row" id="flapRow"></div>
    </div>

    <div class="rate-line" id="rateLine">1 USD = <b>—</b> PKR</div>

    <div class="quick-row">
      <button class="quick-btn" data-amt="100">100</button>
      <button class="quick-btn" data-amt="1000">1,000</button>
      <button class="quick-btn" data-amt="10000">10,000</button>
      <button class="quick-btn" data-amt="100000">100,000</button>
      <button class="quick-btn copy" id="copyBtn">
        <svg viewBox="0 0 24 24" fill="none"><rect x="7" y="7" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M5 15V5a2 2 0 012-2h10" stroke="currentColor" stroke-width="1.6"/></svg>
        Copy result
      </button>
    </div>

    <div class="ticker-wrap">
      <div class="ticker-label">Reference rates</div>
      <div class="ticker" id="ticker"></div>
    </div>
  </div>
  <footer class="note">Rates from open.er-api.com · refreshed on load and every 60s · for reference only, not a quote</footer>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" id="modalList"></div>
</div>

<script>
// Point this at your own backend once deployed, e.g. 'https://your-api.onrender.com'
// Leave as null to call the public open.er-api.com rates directly (no backend needed).
const API_BASE = null;

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

const CURRENCIES = [
  {code:'USD', name:'US Dollar', flag:'🇺🇸'},
  {code:'EUR', name:'Euro', flag:'🇪🇺'},
  {code:'GBP', name:'British Pound', flag:'🇬🇧'},
  {code:'PKR', name:'Pakistani Rupee', flag:'🇵🇰'},
  {code:'AED', name:'UAE Dirham', flag:'🇦🇪'},
  {code:'SAR', name:'Saudi Riyal', flag:'🇸🇦'},
  {code:'INR', name:'Indian Rupee', flag:'🇮🇳'},
  {code:'JPY', name:'Japanese Yen', flag:'🇯🇵'},
  {code:'CNY', name:'Chinese Yuan', flag:'🇨🇳'},
  {code:'AUD', name:'Australian Dollar', flag:'🇦🇺'},
  {code:'CAD', name:'Canadian Dollar', flag:'🇨🇦'},
  {code:'CHF', name:'Swiss Franc', flag:'🇨🇭'},
];

let state = {
  from: 'USD',
  to: 'PKR',
  amount: 100,
  rates: null,
  lastResult: '',
  pickerFor: null,
};

const els = {
  fromBtn: document.getElementById('fromBtn'),
  toBtn: document.getElementById('toBtn'),
  fromCode: document.getElementById('fromCode'),
  toCode: document.getElementById('toCode'),
  fromFlag: document.getElementById('fromFlag'),
  toFlag: document.getElementById('toFlag'),
  amountInput: document.getElementById('amountInput'),
  flapRow: document.getElementById('flapRow'),
  rateLine: document.getElementById('rateLine'),
  status: document.getElementById('status'),
  statusText: document.getElementById('statusText'),
  swapBtn: document.getElementById('swapBtn'),
  ticker: document.getElementById('ticker'),
  modalBackdrop: document.getElementById('modalBackdrop'),
  modalList: document.getElementById('modalList'),
  copyBtn: document.getElementById('copyBtn'),
};

function currencyInfo(code){ return CURRENCIES.find(c => c.code === code); }

function renderCurrencyButtons(){
  const f = currencyInfo(state.from), t = currencyInfo(state.to);
  els.fromCode.textContent = f.code; els.fromFlag.textContent = f.flag;
  els.toCode.textContent = t.code; els.toFlag.textContent = t.flag;
}

function formatNumber(n){
  if (!isFinite(n)) return '0.00';
  const decimals = n >= 1000 ? 2 : (n >= 1 ? 2 : 4);
  return n.toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}

function renderFlaps(text, animate){
  const chars = text.split('');
  const prevChars = els.flapRow.dataset.prev ? els.flapRow.dataset.prev.split('') : [];
  els.flapRow.innerHTML = '';
  chars.forEach((ch, i) => {
    if (ch === ',' || ch === '.'){
      const sep = document.createElement('div');
      sep.className = 'flap-sep';
      sep.textContent = ch;
      els.flapRow.appendChild(sep);
      return;
    }
    const flap = document.createElement('div');
    flap.className = 'flap';
    const face = document.createElement('div');
    face.className = 'flap-face';
    face.textContent = ch;
    flap.appendChild(face);
    if (animate && prevChars[i] !== ch){
      flap.classList.add('flap-flip');
    }
    els.flapRow.appendChild(flap);
  });
  els.flapRow.dataset.prev = text;
  state.lastResult = text;
}

function updateResult(animate){
  if (!state.rates || !state.rates[state.to]) return;
  const rate = state.rates[state.to];
  const result = state.amount * rate;
  renderFlaps(formatNumber(result), animate);
  els.rateLine.innerHTML = `1 ${state.from} = <b>${formatNumber(rate)}</b> ${state.to}`;
}

async function fetchRates(){
  els.status.classList.remove('err');
  els.statusText.textContent = 'updating';
  try {
    let ratesData;
    if (API_BASE) {
      const res = await fetch(`${API_BASE}/api/rates?base=${state.from}`);
      const data = await res.json();
      ratesData = data.rates;
    } else {
      const res = await fetch(`https://open.er-api.com/v6/latest/${state.from}`);
      const data = await res.json();
      if (data.result !== 'success') throw new Error('bad response');
      ratesData = data.rates;
    }
    state.rates = ratesData;
    els.statusText.textContent = 'live';
    updateResult(true);
    renderTicker();
  } catch (e) {
    els.status.classList.add('err');
    els.statusText.textContent = 'offline';
  }
}

function renderTicker(){
  if (!state.rates) return;
  const pairs = ['EUR','GBP','PKR','AED','INR','JPY','CNY'].filter(c => c !== state.from);
  const items = pairs.map(c => `<span class="pair">${state.from}/${c}</span><span class="val">${formatNumber(state.rates[c] || 0)}</span>`);
  const doubled = items.concat(items).join('');
  els.ticker.innerHTML = doubled;
}

function openPicker(which){
  state.pickerFor = which;
  els.modalList.innerHTML = '';
  CURRENCIES.forEach(c => {
    const item = document.createElement('div');
    item.className = 'modal-item';
    item.innerHTML = `<span>${c.flag} <span class="code">${c.code}</span> <span class="name">${c.name}</span></span>`;
    item.onclick = () => {
      if (which === 'from') state.from = c.code; else state.to = c.code;
      renderCurrencyButtons();
      closePicker();
      fetchRates();
    };
    els.modalList.appendChild(item);
  });
  els.modalBackdrop.classList.add('open');
}
function closePicker(){ els.modalBackdrop.classList.remove('open'); }

els.fromBtn.onclick = () => openPicker('from');
els.toBtn.onclick = () => openPicker('to');
els.modalBackdrop.onclick = (e) => { if (e.target === els.modalBackdrop) closePicker(); };

els.swapBtn.onclick = () => {
  els.swapBtn.classList.add('spin');
  setTimeout(() => els.swapBtn.classList.remove('spin'), 200);
  [state.from, state.to] = [state.to, state.from];
  renderCurrencyButtons();
  fetchRates();
};

els.amountInput.addEventListener('input', (e) => {
  const val = parseFloat(e.target.value.replace(/,/g, '')) || 0;
  state.amount = val;
  updateResult(true);
});

document.querySelectorAll('.quick-btn[data-amt]').forEach(btn => {
  btn.onclick = () => {
    const amt = parseFloat(btn.dataset.amt);
    state.amount = amt;
    els.amountInput.value = amt;
    updateResult(true);
  };
});

els.copyBtn.onclick = () => {
  const text = `${state.lastResult} ${state.to}`;
  navigator.clipboard?.writeText(text).catch(() => {});
  const original = els.copyBtn.innerHTML;
  els.copyBtn.innerHTML = 'Copied';
  setTimeout(() => { els.copyBtn.innerHTML = original; }, 1200);
};

renderCurrencyButtons();
fetchRates();
setInterval(fetchRates, 60000);
</script>
</body>
</html>
