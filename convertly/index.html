<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Convertly — Currency Converter</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#F8F9FF">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --primary:#6C63FF;
    --secondary:#8B5CF6;
    --accent:#FFB703;
    --bg:#F8F9FF;
    --card:#FFFFFF;
    --field:#F3F1FF;
    --text:#1F2937;
    --text-secondary:#6B7280;
    --success:#22C55E;
    --error:#EF4444;
    --border:#EAE7FB;
    --shadow-color:rgba(108,99,255,0.18);
    --shadow-color-soft:rgba(108,99,255,0.08);
    --grad-primary:linear-gradient(135deg,var(--primary),var(--secondary));
    --grad-accent:linear-gradient(135deg,#FFB703,#FFD166);
    --radius-lg:28px;
    --radius-md:18px;
    --radius-sm:13px;
  }
  [data-theme="dark"]{
    --bg:#131120;
    --card:#1E1B2E;
    --field:#262238;
    --text:#F3F1FF;
    --text-secondary:#A29FC4;
    --border:#2E2A44;
    --shadow-color:rgba(0,0,0,0.45);
    --shadow-color-soft:rgba(0,0,0,0.3);
    --primary:#8B84FF;
    --secondary:#A78BFA;
    --accent:#FFC94D;
    --success:#34D399;
  }
  *{box-sizing:border-box;}
  html{background:var(--bg);}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    transition:background .35s ease, color .35s ease;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important;}
  }
  h1,h2{font-family:'Poppins',sans-serif; margin:0;}

  /* ---------- decorative background ---------- */
  .bg-decor{position:fixed; inset:0; overflow:hidden; z-index:0; pointer-events:none;}
  .orb{position:absolute; border-radius:50%; filter:blur(60px); opacity:.35; animation:float 12s ease-in-out infinite alternate;}
  .orb-1{width:360px; height:360px; top:-120px; left:-100px; background:var(--primary); animation-delay:0s;}
  .orb-2{width:300px; height:300px; bottom:-100px; right:-80px; background:var(--accent); opacity:.25; animation-delay:2s;}
  .orb-3{width:220px; height:220px; top:40%; right:-60px; background:var(--secondary); opacity:.22; animation-delay:4s;}
  @keyframes float{ from{transform:translate(0,0) scale(1);} to{transform:translate(20px,-24px) scale(1.06);} }

  .app{position:relative; z-index:1; max-width:480px; margin:0 auto; padding:20px 20px 60px;}

  /* ---------- header ---------- */
  .topbar{display:flex; align-items:center; justify-content:space-between; padding:6px 2px 22px;}
  .brand{display:flex; align-items:center; gap:10px;}
  .brand-mark{width:36px; height:36px; border-radius:11px; background:var(--grad-primary); display:flex; align-items:center; justify-content:center; box-shadow:0 8px 20px -6px var(--shadow-color);}
  .brand-name{font-family:'Poppins',sans-serif; font-weight:700; font-size:18px; letter-spacing:-0.2px;}
  .topbar-actions{display:flex; align-items:center; gap:8px;}
  .icon-btn{
    width:38px; height:38px; border-radius:50%; border:1px solid var(--border);
    background:var(--card); color:var(--text-secondary); display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:transform .15s ease, box-shadow .15s ease, color .15s ease;
  }
  .icon-btn:hover{ color:var(--primary); box-shadow:0 6px 16px -6px var(--shadow-color); transform:translateY(-1px);}
  .icon-btn svg{width:17px; height:17px;}
  .theme-toggle{
    width:52px; height:30px; border-radius:999px; border:1px solid var(--border); background:var(--field);
    position:relative; cursor:pointer; transition:background .2s ease;
  }
  .theme-toggle .knob{
    position:absolute; top:3px; left:3px; width:22px; height:22px; border-radius:50%;
    background:var(--grad-primary); display:flex; align-items:center; justify-content:center; color:#fff;
    transition:transform .3s cubic-bezier(.4,1.6,.4,1);
    box-shadow:0 3px 8px -2px var(--shadow-color);
  }
  [data-theme="dark"] .theme-toggle .knob{ transform:translateX(22px); }
  .theme-toggle .knob svg{width:12px; height:12px;}

  /* ---------- hero ---------- */
  .hero-copy{padding:2px 4px 22px; animation:fadeUp .5s ease both;}
  .hero-copy h1{font-size:26px; font-weight:700; letter-spacing:-0.4px; line-height:1.25;}
  .hero-copy h1 span{background:var(--grad-primary); -webkit-background-clip:text; background-clip:text; color:transparent;}
  .hero-copy p{margin:6px 0 0; color:var(--text-secondary); font-size:14px;}

  @keyframes fadeUp{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }

  /* ---------- card ---------- */
  .card{
    background:var(--card);
    border-radius:var(--radius-lg);
    padding:24px 22px 20px;
    box-shadow:0 24px 60px -24px var(--shadow-color), 0 2px 10px -2px var(--shadow-color-soft);
    border:1px solid var(--border);
    animation:cardIn .55s cubic-bezier(.2,.8,.2,1) .08s both;
    transition:background .35s ease, border-color .35s ease;
  }
  @keyframes cardIn{ from{opacity:0; transform:translateY(18px) scale(.98);} to{opacity:1; transform:translateY(0) scale(1);} }

  .field{background:var(--field); border-radius:var(--radius-md); padding:14px 16px; transition:background .35s ease;}
  .field-top{display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;}
  .field-top label{font-size:11.5px; font-weight:600; letter-spacing:.4px; text-transform:uppercase; color:var(--text-secondary);}

  .currency-pill{
    display:flex; align-items:center; gap:7px;
    background:var(--card); border:1px solid var(--border); color:var(--text);
    font-family:'Inter',sans-serif; font-weight:600; font-size:13.5px;
    padding:6px 11px 6px 9px; border-radius:999px; cursor:pointer;
    transition:transform .12s ease, box-shadow .15s ease, border-color .15s ease;
  }
  .currency-pill:hover{ box-shadow:0 6px 16px -8px var(--shadow-color); border-color:var(--primary); }
  .currency-pill:active{ transform:scale(.96); }
  .currency-pill .flag{font-size:15px;}
  .currency-pill svg{width:9px; height:9px; opacity:.55; margin-left:1px;}

  .amount-field{
    width:100%; background:transparent; border:none; outline:none; color:var(--text);
    font-family:'Poppins',sans-serif; font-weight:700; font-size:30px; letter-spacing:-.3px; padding:2px 0 0;
  }
  .amount-field::placeholder{color:#B9B4E0;}

  .swap-row{display:flex; align-items:center; gap:10px; margin:6px 0;}
  .swap-line{flex:1; height:1px; background:var(--border);}
  .swap-btn{
    width:42px; height:42px; border-radius:50%; border:none; cursor:pointer;
    background:var(--grad-primary); color:#fff; display:flex; align-items:center; justify-content:center;
    box-shadow:0 10px 22px -8px var(--shadow-color);
    transition:transform .45s cubic-bezier(.34,1.56,.64,1);
    flex-shrink:0;
  }
  .swap-btn:hover{ filter:brightness(1.06); }
  .swap-btn.spin{ transform:rotate(180deg) scale(1.05); }
  .swap-btn svg{width:18px; height:18px;}

  .result-field .result-value{
    font-family:'Poppins',sans-serif; font-weight:700; font-size:30px; letter-spacing:-.3px;
    background:var(--grad-primary); -webkit-background-clip:text; background-clip:text; color:transparent;
    padding-top:2px;
  }

  .rate-strip{
    display:flex; align-items:center; gap:7px; justify-content:center;
    font-size:12.5px; color:var(--text-secondary); margin:16px 0 16px; font-weight:500;
  }
  .live-dot{width:6px; height:6px; border-radius:50%; background:var(--success); box-shadow:0 0 0 3px rgba(34,197,94,0.18); animation:pulse 2.2s ease-in-out infinite;}
  .live-dot.err{background:var(--error); box-shadow:0 0 0 3px rgba(239,68,68,0.18); animation:none;}
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.4;} }
  .rate-strip b{color:var(--text); font-weight:700;}

  .chips-row{display:flex; gap:8px; flex-wrap:wrap;}
  .chip{
    background:var(--field); border:1px solid transparent; color:var(--text-secondary);
    font-family:'Inter',sans-serif; font-weight:600; font-size:12.5px;
    padding:8px 14px; border-radius:999px; cursor:pointer;
    transition:border-color .15s ease, color .15s ease, transform .1s ease;
  }
  .chip:hover{ color:var(--primary); border-color:var(--primary); }
  .chip:active{ transform:scale(.95); }
  .chip.copy-chip{ margin-left:auto; display:flex; align-items:center; gap:6px; color:var(--primary); background:transparent; border:1px solid var(--border); }
  .chip.copy-chip svg{width:12px; height:12px;}
  .chip.copy-chip.copied{ color:var(--success); border-color:var(--success); }

  /* ---------- history ---------- */
  .history-panel{margin-top:16px; animation:fadeUp .4s ease both;}
  .history-panel[hidden]{display:none;}
  .history-head{display:flex; align-items:center; justify-content:space-between; padding:2px 6px 10px;}
  .history-head h2{font-size:15px; font-weight:700;}
  .history-head button{background:none; border:none; color:var(--text-secondary); font-family:'Inter',sans-serif; font-size:12.5px; font-weight:600; cursor:pointer;}
  .history-head button:hover{color:var(--error);}
  .history-list{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:8px;}
  .history-item{
    background:var(--card); border:1px solid var(--border); border-radius:var(--radius-sm);
    padding:12px 14px; display:flex; align-items:center; gap:10px; cursor:pointer;
    transition:box-shadow .15s ease, border-color .15s ease;
  }
  .history-item:hover{ box-shadow:0 8px 18px -10px var(--shadow-color); border-color:var(--primary); }
  .history-item .h-flags{font-size:15px; flex-shrink:0;}
  .history-item .h-text{flex:1; font-size:13px; font-weight:500;}
  .history-item .h-text b{font-weight:700;}
  .history-item .h-time{font-size:11px; color:var(--text-secondary); flex-shrink:0;}
  .history-item .h-del{
    width:22px; height:22px; border-radius:50%; border:none; background:transparent; color:var(--text-secondary);
    display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0;
  }
  .history-item .h-del:hover{ color:var(--error); background:rgba(239,68,68,0.1); }
  .history-item .h-del svg{width:11px; height:11px;}
  .history-empty{color:var(--text-secondary); font-size:13px; text-align:center; padding:18px 0;}
  .history-empty[hidden]{display:none;}

  .footnote{
    text-align:center; font-size:11px; color:var(--text-secondary); margin-top:24px; opacity:.75;
  }

  /* ---------- currency picker sheet ---------- */
  .sheet-backdrop{
    position:fixed; inset:0; background:rgba(31,41,55,0.35); backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px);
    display:none; align-items:flex-end; justify-content:center; z-index:30; padding:0;
  }
  .sheet-backdrop.open{display:flex;}
  @media (min-width:640px){
    .sheet-backdrop{align-items:center; padding:20px;}
  }
  .sheet{
    background:var(--card); width:100%; max-width:420px; max-height:78vh;
    border-radius:26px 26px 0 0; display:flex; flex-direction:column; overflow:hidden;
    box-shadow:0 -20px 50px -20px rgba(31,41,55,.3);
    animation:sheetUp .28s cubic-bezier(.2,.8,.2,1);
  }
  @media (min-width:640px){
    .sheet{border-radius:24px; max-height:72vh; animation:sheetPop .2s cubic-bezier(.2,.8,.2,1);}
  }
  @keyframes sheetUp{ from{transform:translateY(100%);} to{transform:translateY(0);} }
  @keyframes sheetPop{ from{opacity:0; transform:translateY(8px) scale(.97);} to{opacity:1; transform:translateY(0) scale(1);} }
  .sheet-handle{width:36px; height:4px; border-radius:99px; background:var(--border); margin:12px auto 4px;}
  @media (min-width:640px){ .sheet-handle{display:none;} }

  .sheet-search{display:flex; align-items:center; gap:8px; margin:12px 16px; background:var(--field); border-radius:999px; padding:10px 14px;}
  .sheet-search svg{width:15px; height:15px; color:var(--text-secondary); flex-shrink:0;}
  .sheet-search input{flex:1; border:none; outline:none; background:transparent; color:var(--text); font-family:'Inter',sans-serif; font-size:14px;}
  .sheet-search input::placeholder{color:var(--text-secondary);}

  .sheet-tabs{display:flex; gap:6px; margin:0 16px 10px;}
  .tab{
    flex:1; text-align:center; padding:8px 0; border-radius:999px; border:1px solid var(--border);
    background:transparent; color:var(--text-secondary); font-family:'Inter',sans-serif; font-size:12.5px; font-weight:600;
    cursor:pointer; transition:all .15s ease;
  }
  .tab.active{background:var(--grad-primary); color:#fff; border-color:transparent;}

  .sheet-list{overflow:auto; padding:4px 10px 16px;}
  .sheet-item{
    display:flex; align-items:center; gap:11px; padding:10px 8px; border-radius:14px; cursor:pointer;
    transition:background .12s ease;
  }
  .sheet-item:hover{background:var(--field);}
  .sheet-item .flag{font-size:20px; flex-shrink:0;}
  .sheet-item .meta{flex:1; min-width:0;}
  .sheet-item .code{font-weight:700; font-size:13.5px;}
  .sheet-item .name{font-size:11.5px; color:var(--text-secondary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .sheet-item .star-btn{
    width:28px; height:28px; border-radius:50%; border:none; background:transparent; color:var(--border);
    display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0;
  }
  .sheet-item .star-btn:hover{color:var(--accent);}
  .sheet-item .star-btn.active{color:var(--accent);}
  .sheet-item .star-btn svg{width:16px; height:16px;}
  .sheet-group-label{font-size:10.5px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--text-secondary); padding:12px 10px 4px;}
  .sheet-empty{padding:26px 10px; text-align:center; color:var(--text-secondary); font-size:13px;}

  button:focus-visible, input:focus-visible, .currency-pill:focus-visible, .swap-btn:focus-visible{
    outline:2px solid var(--primary); outline-offset:2px;
  }
</style>
</head>
<body>

<div class="bg-decor">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="app">
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M7 10l5-5 5 5M12 5v14M17 14l-5 5-5-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
      <span class="brand-name">Convertly</span>
    </div>
    <div class="topbar-actions">
      <button class="icon-btn" id="historyBtn" aria-label="Show conversion history">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/><path d="M12 7v5l3.5 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
        <span class="knob" id="themeKnob">
          <svg id="themeIcon" viewBox="0 0 24 24" fill="none"><path d="M12 3v1.5M12 19.5V21M4.9 4.9l1.1 1.1M18 18l1.1 1.1M3 12h1.5M19.5 12H21M4.9 19.1l1.1-1.1M18 6l1.1-1.1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="12" cy="12" r="4.5" stroke="currentColor" stroke-width="1.8"/></svg>
        </span>
      </button>
    </div>
  </header>

  <div class="hero-copy">
    <h1>Send money, <span>simply</span>.</h1>
    <p>Live mid-market rates, refreshed every minute — no markup, no drama.</p>
  </div>

  <section class="card" id="converterCard">
    <div class="field">
      <div class="field-top">
        <label>You send</label>
        <button class="currency-pill" id="fromPill" aria-haspopup="listbox">
          <span class="flag" id="fromFlag">🇺🇸</span>
          <span id="fromCode">USD</span>
          <svg viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.4"/></svg>
        </button>
      </div>
      <input class="amount-field" id="amountInput" inputmode="decimal" value="100" aria-label="Amount to send" />
    </div>

    <div class="swap-row">
      <div class="swap-line"></div>
      <button class="swap-btn" id="swapBtn" aria-label="Swap currencies">
        <svg viewBox="0 0 24 24" fill="none"><path d="M7 8l4-4 4 4M11 4v11M17 16l-4 4-4-4M13 20V9" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="swap-line"></div>
    </div>

    <div class="field result-field">
      <div class="field-top">
        <label>You get</label>
        <button class="currency-pill" id="toPill" aria-haspopup="listbox">
          <span class="flag" id="toFlag">🇵🇰</span>
          <span id="toCode">PKR</span>
          <svg viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.4"/></svg>
        </button>
      </div>
      <div class="result-value" id="resultValue">0.00</div>
    </div>

    <div class="rate-strip">
      <span class="live-dot" id="statusDot"></span>
      <span id="rateText">1 USD = <b>—</b> PKR</span>
    </div>

    <div class="chips-row">
      <button class="chip" data-amt="100">100</button>
      <button class="chip" data-amt="1000">1,000</button>
      <button class="chip" data-amt="10000">10,000</button>
      <button class="chip copy-chip" id="copyBtn">
        <svg viewBox="0 0 24 24" fill="none"><rect x="7" y="7" width="12" height="12" rx="2.5" stroke="currentColor" stroke-width="1.8"/><path d="M5 15V5a2 2 0 012-2h10" stroke="currentColor" stroke-width="1.8"/></svg>
        Copy
      </button>
    </div>
  </section>

  <section class="history-panel" id="historyPanel" hidden>
    <div class="history-head">
      <h2>Recent conversions</h2>
      <button id="clearHistory">Clear</button>
    </div>
    <ul class="history-list" id="historyList"></ul>
    <p class="history-empty" id="historyEmpty">No conversions yet — try one above.</p>
  </section>

  <p class="footnote">Rates from open.er-api.com · this session's favorites &amp; history live in memory only</p>
</div>

<div class="sheet-backdrop" id="sheetBackdrop">
  <div class="sheet" id="sheet" role="listbox">
    <div class="sheet-handle"></div>
    <div class="sheet-search">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8"/><path d="M21 21l-4.3-4.3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <input id="sheetSearch" placeholder="Search currency or code…" autocomplete="off" />
    </div>
    <div class="sheet-tabs">
      <button class="tab active" data-tab="all">All</button>
      <button class="tab" data-tab="favorites">Favorites</button>
      <button class="tab" data-tab="recent">Recent</button>
    </div>
    <div class="sheet-list" id="sheetList"></div>
  </div>
</div>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

/* Curated set of commonly-used currencies with flags. The rate API itself
   covers 150+ codes — this list keeps the picker fast and legible; add more
   entries here any time without touching the rest of the app. */
const CURRENCIES = [
  {code:'USD', name:'US Dollar', flag:'🇺🇸'}, {code:'EUR', name:'Euro', flag:'🇪🇺'},
  {code:'GBP', name:'British Pound', flag:'🇬🇧'}, {code:'PKR', name:'Pakistani Rupee', flag:'🇵🇰'},
  {code:'AED', name:'UAE Dirham', flag:'🇦🇪'}, {code:'SAR', name:'Saudi Riyal', flag:'🇸🇦'},
  {code:'INR', name:'Indian Rupee', flag:'🇮🇳'}, {code:'CNY', name:'Chinese Yuan', flag:'🇨🇳'},
  {code:'JPY', name:'Japanese Yen', flag:'🇯🇵'}, {code:'AUD', name:'Australian Dollar', flag:'🇦🇺'},
  {code:'CAD', name:'Canadian Dollar', flag:'🇨🇦'}, {code:'CHF', name:'Swiss Franc', flag:'🇨🇭'},
  {code:'SGD', name:'Singapore Dollar', flag:'🇸🇬'}, {code:'HKD', name:'Hong Kong Dollar', flag:'🇭🇰'},
  {code:'NZD', name:'New Zealand Dollar', flag:'🇳🇿'}, {code:'SEK', name:'Swedish Krona', flag:'🇸🇪'},
  {code:'NOK', name:'Norwegian Krone', flag:'🇳🇴'}, {code:'DKK', name:'Danish Krone', flag:'🇩🇰'},
  {code:'ZAR', name:'South African Rand', flag:'🇿🇦'}, {code:'RUB', name:'Russian Ruble', flag:'🇷🇺'},
  {code:'BRL', name:'Brazilian Real', flag:'🇧🇷'}, {code:'MXN', name:'Mexican Peso', flag:'🇲🇽'},
  {code:'KRW', name:'South Korean Won', flag:'🇰🇷'}, {code:'TRY', name:'Turkish Lira', flag:'🇹🇷'},
  {code:'THB', name:'Thai Baht', flag:'🇹🇭'}, {code:'MYR', name:'Malaysian Ringgit', flag:'🇲🇾'},
  {code:'IDR', name:'Indonesian Rupiah', flag:'🇮🇩'}, {code:'PHP', name:'Philippine Peso', flag:'🇵🇭'},
  {code:'VND', name:'Vietnamese Dong', flag:'🇻🇳'}, {code:'EGP', name:'Egyptian Pound', flag:'🇪🇬'},
  {code:'NGN', name:'Nigerian Naira', flag:'🇳🇬'}, {code:'KES', name:'Kenyan Shilling', flag:'🇰🇪'},
  {code:'BDT', name:'Bangladeshi Taka', flag:'🇧🇩'}, {code:'LKR', name:'Sri Lankan Rupee', flag:'🇱🇰'},
  {code:'NPR', name:'Nepalese Rupee', flag:'🇳🇵'}, {code:'QAR', name:'Qatari Riyal', flag:'🇶🇦'},
  {code:'KWD', name:'Kuwaiti Dinar', flag:'🇰🇼'}, {code:'BHD', name:'Bahraini Dinar', flag:'🇧🇭'},
  {code:'OMR', name:'Omani Rial', flag:'🇴🇲'}, {code:'JOD', name:'Jordanian Dinar', flag:'🇯🇴'},
  {code:'ILS', name:'Israeli Shekel', flag:'🇮🇱'}, {code:'PLN', name:'Polish Zloty', flag:'🇵🇱'},
  {code:'CZK', name:'Czech Koruna', flag:'🇨🇿'}, {code:'HUF', name:'Hungarian Forint', flag:'🇭🇺'},
  {code:'RON', name:'Romanian Leu', flag:'🇷🇴'}, {code:'UAH', name:'Ukrainian Hryvnia', flag:'🇺🇦'},
  {code:'ARS', name:'Argentine Peso', flag:'🇦🇷'}, {code:'CLP', name:'Chilean Peso', flag:'🇨🇱'},
  {code:'COP', name:'Colombian Peso', flag:'🇨🇴'}, {code:'PEN', name:'Peruvian Sol', flag:'🇵🇪'},
  {code:'TWD', name:'New Taiwan Dollar', flag:'🇹🇼'},
];
const POPULAR = ['USD','EUR','GBP','PKR','AED','INR','SAR','CNY'];

const REDUCE_MOTION = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

let state = {
  from:'USD', to:'PKR', amount:100, rates:null,
  favorites:new Set(['USD','EUR','PKR']),
  recents:['USD','PKR','EUR'],
  history:[],
  pickerFor:null, activeTab:'all',
  displayedResult:0,
};

const els = {};
['fromPill','toPill','fromCode','toCode','fromFlag','toFlag','amountInput','resultValue',
 'rateText','statusDot','swapBtn','copyBtn','sheetBackdrop','sheet','sheetSearch','sheetList',
 'historyBtn','historyPanel','historyList','historyEmpty','clearHistory','themeToggle','themeKnob'
].forEach(id => els[id] = document.getElementById(id));

function currencyInfo(code){ return CURRENCIES.find(c => c.code === code) || {code, name:code, flag:'💱'}; }

function renderPills(){
  const f = currencyInfo(state.from), t = currencyInfo(state.to);
  els.fromCode.textContent = f.code; els.fromFlag.textContent = f.flag;
  els.toCode.textContent = t.code; els.toFlag.textContent = t.flag;
}

function formatNumber(n){
  if (!isFinite(n)) return '0.00';
  const decimals = n >= 1000 ? 2 : (n >= 1 ? 2 : 4);
  return n.toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}

/* smooth count-up when the result changes, instead of a hard jump */
function tweenResult(from, to, duration){
  if (REDUCE_MOTION){ els.resultValue.textContent = formatNumber(to); state.displayedResult = to; return; }
  const start = performance.now();
  function frame(now){
    const p = Math.min(1, (now - start) / duration);
    const eased = 1 - Math.pow(1 - p, 3);
    const val = from + (to - from) * eased;
    els.resultValue.textContent = formatNumber(val);
    if (p < 1) requestAnimationFrame(frame); else state.displayedResult = to;
  }
  requestAnimationFrame(frame);
}

function updateResult(recordHistory){
  if (!state.rates || !state.rates[state.to]) return;
  const rate = state.rates[state.to];
  const result = state.amount * rate;
  tweenResult(state.displayedResult, result, 480);
  els.rateText.innerHTML = `1 ${state.from} = <b>${formatNumber(rate)}</b> ${state.to}`;
  if (recordHistory && state.amount > 0) addHistoryEntry(state.from, state.to, state.amount, result);
}

async function fetchRates(recordHistory){
  els.statusDot.classList.remove('err');
  try {
    const res = await fetch(`https://open.er-api.com/v6/latest/${state.from}`);
    const data = await res.json();
    if (data.result !== 'success') throw new Error('bad response');
    state.rates = data.rates;
    updateResult(recordHistory);
  } catch (e) {
    els.statusDot.classList.add('err');
  }
}

/* ---------- history ---------- */

function addHistoryEntry(from, to, amount, result){
  const last = state.history[0];
  if (last && last.from === from && last.to === to && last.amount === amount) return;
  state.history.unshift({from, to, amount, result, at: Date.now()});
  state.history = state.history.slice(0, 8);
  renderHistory();
}

function timeAgo(ts){
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 10) return 'just now';
  if (s < 60) return `${s}s ago`;
  const m = Math.floor(s / 60);
  if (m < 60) return `${m}m ago`;
  return `${Math.floor(m / 60)}h ago`;
}

function renderHistory(){
  els.historyList.innerHTML = '';
  els.historyEmpty.hidden = state.history.length > 0;
  state.history.forEach((h, i) => {
    const li = document.createElement('li');
    li.className = 'history-item';
    const f = currencyInfo(h.from), t = currencyInfo(h.to);
    li.innerHTML = `
      <span class="h-flags">${f.flag}→${t.flag}</span>
      <span class="h-text"><b>${formatNumber(h.amount)} ${h.from}</b> → ${formatNumber(h.result)} ${h.to}</span>
      <span class="h-time">${timeAgo(h.at)}</span>
      <button class="h-del" aria-label="Remove entry" data-i="${i}">
        <svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>`;
    li.addEventListener('click', (e) => {
      if (e.target.closest('.h-del')) return;
      state.from = h.from; state.to = h.to; state.amount = h.amount;
      els.amountInput.value = h.amount;
      renderPills();
      fetchRates(false);
      window.scrollTo({top:0, behavior: REDUCE_MOTION ? 'auto' : 'smooth'});
    });
    li.querySelector('.h-del').addEventListener('click', (e) => {
      e.stopPropagation();
      state.history.splice(i, 1);
      renderHistory();
    });
    els.historyList.appendChild(li);
  });
}

els.historyBtn.onclick = () => {
  els.historyPanel.hidden = !els.historyPanel.hidden;
};
els.clearHistory.onclick = () => { state.history = []; renderHistory(); };

/* ---------- currency picker sheet ---------- */

function addRecent(code){
  state.recents = [code, ...state.recents.filter(c => c !== code)].slice(0, 6);
}

function buildSheetList(){
  const q = els.sheetSearch.value.trim().toUpperCase();
  const matches = c => !q || c.code.includes(q) || c.name.toUpperCase().includes(q);
  els.sheetList.innerHTML = '';

  let list;
  if (state.activeTab === 'favorites') list = CURRENCIES.filter(c => state.favorites.has(c.code) && matches(c));
  else if (state.activeTab === 'recent') list = state.recents.map(currencyInfo).filter(matches);
  else list = CURRENCIES.filter(matches);

  if (state.activeTab === 'all' && !q){
    const popular = list.filter(c => POPULAR.includes(c.code));
    const rest = list.filter(c => !POPULAR.includes(c.code));
    renderGroup('Popular', popular);
    renderGroup('More currencies', rest);
  } else if (!list.length){
    const empty = document.createElement('div');
    empty.className = 'sheet-empty';
    empty.textContent = state.activeTab === 'favorites' ? 'No favorites yet — tap a star to add one.'
      : state.activeTab === 'recent' ? 'No recent currencies yet.' : 'No matching currency';
    els.sheetList.appendChild(empty);
  } else {
    renderGroup(null, list);
  }
}

function renderGroup(label, list){
  if (!list.length) return;
  if (label){
    const lbl = document.createElement('div');
    lbl.className = 'sheet-group-label';
    lbl.textContent = label;
    els.sheetList.appendChild(lbl);
  }
  list.forEach(c => {
    const item = document.createElement('div');
    item.className = 'sheet-item';
    item.setAttribute('role','option');
    const isFav = state.favorites.has(c.code);
    item.innerHTML = `
      <span class="flag">${c.flag}</span>
      <span class="meta"><div class="code">${c.code}</div><div class="name">${c.name}</div></span>
      <button class="star-btn ${isFav ? 'active' : ''}" aria-label="Toggle favorite">
        <svg viewBox="0 0 24 24" fill="${isFav ? 'currentColor' : 'none'}"><path d="M12 3l2.6 5.7 6.2.6-4.7 4.2 1.4 6.1L12 16.9 6.5 19.6l1.4-6.1-4.7-4.2 6.2-.6L12 3z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
      </button>`;
    item.querySelector('.star-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      if (state.favorites.has(c.code)) state.favorites.delete(c.code); else state.favorites.add(c.code);
      buildSheetList();
    });
    item.addEventListener('click', () => {
      if (state.pickerFor === 'from') state.from = c.code; else state.to = c.code;
      addRecent(c.code);
      renderPills();
      closeSheet();
      fetchRates(false);
    });
    els.sheetList.appendChild(item);
  });
}

function openSheet(which){
  state.pickerFor = which;
  state.activeTab = 'all';
  els.sheetSearch.value = '';
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'all'));
  buildSheetList();
  els.sheetBackdrop.classList.add('open');
  setTimeout(() => els.sheetSearch.focus(), 60);
}
function closeSheet(){ els.sheetBackdrop.classList.remove('open'); }

document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    state.activeTab = tab.dataset.tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t === tab));
    buildSheetList();
  };
});
els.sheetSearch.addEventListener('input', buildSheetList);
els.fromPill.onclick = () => openSheet('from');
els.toPill.onclick = () => openSheet('to');
els.sheetBackdrop.onclick = (e) => { if (e.target === els.sheetBackdrop) closeSheet(); };
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeSheet(); });

/* ---------- swap / amount / chips / copy ---------- */

els.swapBtn.onclick = () => {
  els.swapBtn.classList.add('spin');
  setTimeout(() => els.swapBtn.classList.remove('spin'), 460);
  [state.from, state.to] = [state.to, state.from];
  renderPills();
  fetchRates(false);
};

els.amountInput.addEventListener('input', (e) => {
  const val = parseFloat(e.target.value.replace(/,/g, '')) || 0;
  state.amount = val;
  updateResult(false);
});
els.amountInput.addEventListener('change', () => updateResult(true));

document.querySelectorAll('.chip[data-amt]').forEach(btn => {
  btn.onclick = () => {
    const amt = parseFloat(btn.dataset.amt);
    state.amount = amt;
    els.amountInput.value = amt;
    updateResult(true);
  };
});

els.copyBtn.onclick = () => {
  const text = `${els.resultValue.textContent} ${state.to}`;
  navigator.clipboard?.writeText(text).catch(() => {});
  const original = els.copyBtn.innerHTML;
  els.copyBtn.classList.add('copied');
  els.copyBtn.innerHTML = 'Copied';
  setTimeout(() => { els.copyBtn.innerHTML = original; els.copyBtn.classList.remove('copied'); }, 1200);
};

/* ---------- dark mode ----------
   Kept in memory only for this preview session — when you host this
   yourself, swap the two lines below for localStorage to persist the
   choice across visits. */
let theme = 'light';
function applyTheme(){
  document.documentElement.dataset.theme = theme;
  els.themeIcon = document.getElementById('themeIcon');
}
els.themeToggle.onclick = () => {
  theme = theme === 'light' ? 'dark' : 'light';
  applyTheme();
};

renderPills();
renderHistory();
fetchRates(false);
setInterval(() => fetchRates(false), 60000);
</script>
</body>
</html>
